    function initGame() {

                customPhrases[i] = defaults[i] || `Number ${i}`;
            }
        }

        renderBoard();
        renderEditor();

        document.getElementById("currentNumber").textContent = "--";
        document.getElementById("currentPhrase").textContent = "Press CALL NEXT NUMBER to begin";
        document.getElementById("count").textContent = "0";

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function callNextNumber() {
        if (remainingNumbers.length === 0) {
            alert("All numbers have been called!");
            return;
        }

        shuffle(remainingNumbers);

        const number = remainingNumbers.pop();
        calledNumbers.push(number);

        const phrase = customPhrases[number];

        document.getElementById("currentNumber").textContent = number;
        document.getElementById("currentPhrase").textContent = phrase;
        document.getElementById("count").textContent = calledNumbers.length;

        renderBoard();
        speak(phrase);
    }

    function renderBoard() {
        const grid = document.getElementById("calledGrid");
        grid.innerHTML = "";

        for (let i = 1; i <= 90; i++) {
            const div = document.createElement("div");
            div.className = "ball";

            if (calledNumbers.includes(i)) {
                div.classList.add("called");
            }

            div.textContent = i;
            grid.appendChild(div);
        }
    }

    function renderEditor() {
        const editor = document.getElementById("editorGrid");
        editor.innerHTML = "";

        for (let i = 1; i <= 90; i++) {
            const item = document.createElement("div");
            item.className = "editor-item";

            item.innerHTML = `
                <label>${i}</label>
                <input 
                    type="text" 
                    value="${customPhrases[i]}" 
                    onchange="updatePhrase(${i}, this.value)"
                />
            `;

            editor.appendChild(item);
        }
    }

    function updatePhrase(number, value) {
        customPhrases[number] = value;
    }

    function speak(text) {
        speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        const selectedVoice = document.getElementById("voiceSelect").value;
        const voice = voices.find(v => v.name === selectedVoice);

        if (voice) {
            utterance.voice = voice;
        }

        utterance.rate = parseFloat(document.getElementById("rate").value);

        speechSynthesis.speak(utterance);
    }

    function repeatLast() {
        if (calledNumbers.length === 0) return;

        const last = calledNumbers[calledNumbers.length - 1];
        speak(customPhrases[last]);
    }

    function resetGame() {
        if (confirm("Reset the game?")) {
            initGame();
        }
    }

    function loadVoices() {
        voices = speechSynthesis.getVoices();

        const select = document.getElementById("voiceSelect");
        select.innerHTML = "";

        const englishVoices = voices.filter(v =>
            v.lang.includes("en")
        );

        englishVoices.forEach(v => {
            const option = document.createElement("option");
            option.value = v.name;
            option.textContent = `${v.name} (${v.lang})`;
            select.appendChild(option);
        });

        // Prefer UK voices if available
        const ukVoice = englishVoices.find(v =>
            v.lang === "en-GB"
        );

        if (ukVoice) {
            select.value = ukVoice.name;
        }
    }

    speechSynthesis.onvoiceschanged = loadVoices;

    initGame();
    loadVoices();
