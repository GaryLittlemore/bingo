<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UK 90 Ball Bingo Caller</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #111;
        color: white;
        overflow-x: hidden;
    }

    .topbar {
        background: #1e1e1e;
        padding: 15px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: center;
        border-bottom: 2px solid #333;
    }

    button, select, input, textarea {
        padding: 10px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    button {
        cursor: pointer;
        font-weight: bold;
    }

    .call-btn {
        background: #00c853;
        color: white;
    }

    .reset-btn {
        background: #d50000;
        color: white;
    }

    .speak-btn {
        background: #2962ff;
        color: white;
    }

    .main-number {
        height: 45vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: #000;
        border-bottom: 4px solid #333;
    }

    .number {
        font-size: 12vw;
        font-weight: bold;
        line-height: 1;
    }

    .phrase {
        font-size: 2vw;
        margin-top: 10px;
        color: #ffd54f;
        text-align: center;
        padding: 0 20px;
    }

    .stats {
        text-align: center;
        padding: 15px;
        font-size: 1.3rem;
        background: #181818;
    }

    .called-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
        gap: 10px;
        padding: 20px;
    }

    .ball {
        background: #222;
        border: 2px solid #444;
        border-radius: 12px;
        padding: 15px 5px;
        text-align: center;
        font-size: 1.4rem;
        font-weight: bold;
    }

    .ball.called {
        background: #00c853;
        color: black;
        border-color: #00ff84;
    }

    .editor {
        padding: 20px;
        background: #101010;
        border-top: 2px solid #333;
    }

    .editor h2 {
        margin-top: 0;
    }

    .editor-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 12px;
    }

    .editor-item {
        background: #1c1c1c;
        padding: 10px;
        border-radius: 10px;
    }

    .editor-item label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .editor-item input {
        width: 100%;
    }

    @media (max-width: 768px) {
        .number {
            font-size: 25vw;
        }

        .phrase {
            font-size: 5vw;
        }
    }
</style>
</head>
<body>

<div class="main-number">
    <div class="number" id="currentNumber">--</div>
    <div class="phrase" id="currentPhrase">Press CALL NEXT NUMBER to begin</div>
</div>

<div class="topbar">
    <button class="call-btn" onclick="callNextNumber()">CALL NEXT NUMBER</button>
    <button class="speak-btn" onclick="repeatLast()">REPEAT</button>
    <button class="reset-btn" onclick="resetGame()">RESET</button>

    <select id="voiceSelect"></select>

    <label>
        Speed
        <input type="range" min="0.5" max="1.5" step="0.1" value="1" id="rate">
    </label>
</div>

<div class="stats">
    Numbers Called: <span id="count">0</span> / 90
</div>

<div class="called-grid" id="calledGrid"></div>

<div class="editor">
    <h2>Custom Call Phrases</h2>
    <p>Edit what is spoken for each number.</p>

    <div class="editor-grid" id="editorGrid"></div>
</div>

<script>
    let remainingNumbers = [];
    let calledNumbers = [];
    let voices = [];

    const customPhrases = {};

    // Default UK bingo calls
    const defaults = {

        1: "Kelly’s eye, number 1",
        2: "One little duck, number 2",
        3: "Cup of tea, number 3",
        4: "Knock at the door, number 4",
        5: "Man alive, number 5",
        6: "Half a dozen, number 6",
        7: "Lucky seven, number 7",
        8: "Garden gate, number 8",
        9: "Doctor’s orders, number 9",
        10: "Starmer’s den, number 10",

        11: "Legs eleven, number 11",
        12: "One dozen, number 12",
        13: "Unlucky for some, number 13",
        14: "Valentine’s Day, number 14",
        15: "Young and keen, number 15",
        16: "Sweet 16 and never been kissed, number 16",
        17: "Dancing queen, number 17",
        18: "Coming of age, number 18",
        19: "Goodbye teens, number 19",
        20: "One score, number 20",

        21: "Key of the door, number 21",
        22: "Two little ducks, number 22",
        23: "Thee and me, number 23",
        24: "Two dozen, number 24",
        25: "Duck and dive, number 25",
        26: "Pick and mix, number 26",
        27: "Gateway to heaven, number 27",
        28: "In a state, number 28",
        29: "Rise and shine, number 29",
        30: "Dirty Gertie, number 30",

        31: "Get up and run, number 31",
        32: "Buckle my shoe, number 32",
        33: "Fish, chips & peas, number 33",
        34: "Ask for more, number 34",
        35: "Jump and jive, number 35",
        36: "Three dozen, number 36",
        37: "More than eleven, number 37",
        38: "Christmas cake, number 38",
        39: "39 steps, number 39",
        40: "Life begins, number 40",

        41: "Time for fun, number 41",
        42: "Winnie the Pooh, number 42",
        43: "Down on your knee, number 43",
        44: "Droopy drawers, number 44",
        45: "Halfway there, number 45",
        46: "Up to tricks, number 46",
        47: "Four and seven, number 47",
        48: "Four dozen, number 48",
        49: "PC, number 49",
        50: "Half a century, number 50",

        51: "Tweak of the thumb, number 51",
        52: "Danny La Rue, number 52",
        53: "Stuck in a tree, number 53",
        54: "Clean the floor, number 54",
        55: "Snakes alive, number 55",
        56: "Shotts Bus, number 56",
        57: "Heinz varieties, number 57",
        58: "Make them wait, number 58",
        59: "Brighton Line, number 59",
        60: "Five dozen, number 60",

        61: "Baker’s bun, number 61",
        62: "Tickety-boo, number 62",
        63: "Tickle me 63, number 63",
        64: "Red raw, number 64",
        65: "Old age pension, number 65",
        66: "Clickety click, number 66",
        67: "Stairway to heaven, number 67",
        68: "Saving Grace, number 68",
        69: "Favourite of mine, number 69",
        70: "Three score and ten, number 70",

        71: "Bang on the drum, number 71",
        72: "Six dozen, number 72",
        73: "Queen bee, number 73",
        74: "Hit the floor, number 74",
        75: "Strive and strive, number 75",
        76: "Trombones, number 76",
        77: "Sunset strip, number 77",
        78: "Heaven's gate, number 78",
        79: "One more time, number 79",
        80: "Eight and blank, number 80",

        81: "Stop and run, number 81",
        82: "Straight on through, number 82",
        83: "Time for tea, number 83",
        84: "Seven dozen, number 84",
        85: "Staying alive, number 85",
        86: "Between the sticks, number 86",
        87: "Torquay in Devon, number 87",
        88: "Two fat ladies, number 88",
        89: "Nearly there, number 89",
        90: "Top of the shop, number 90"

    };

    function initGame() {
        remainingNumbers = [];
        calledNumbers = [];

        for (let i = 1; i <= 90; i++) {
            remainingNumbers.push(i);

            if (!customPhrases[i]) {
                customPhrases[i] = defaults[i] || `Number ${i}`;
            }
        }

        renderBoard();
        renderEditor();

        document.getElementById("currentNumber").textContent = "--";
        document.getElementById("currentPhrase").textContent = "Press CALL NEXT NUMBER to begin";
        document.getElementById("count").textContent = "0";
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function callNextNumber() {
        if (remainingNumbers.length === 0) {
            alert("All numbers have been called!");
            return;
        }

        shuffle(remainingNumbers);

        const number = remainingNumbers.pop();
        calledNumbers.push(number);

        const phrase = customPhrases[number];

        document.getElementById("currentNumber").textContent = number;
        document.getElementById("currentPhrase").textContent = phrase;
        document.getElementById("count").textContent = calledNumbers.length;

        renderBoard();
        speak(phrase);
    }

    function renderBoard() {
        const grid = document.getElementById("calledGrid");
        grid.innerHTML = "";

        for (let i = 1; i <= 90; i++) {
            const div = document.createElement("div");
            div.className = "ball";

            if (calledNumbers.includes(i)) {
                div.classList.add("called");
            }

            div.textContent = i;
            grid.appendChild(div);
        }
    }

    function renderEditor() {
        const editor = document.getElementById("editorGrid");
        editor.innerHTML = "";

        for (let i = 1; i <= 90; i++) {
            const item = document.createElement("div");
            item.className = "editor-item";

            item.innerHTML = `
                <label>${i}</label>
                <input 
                    type="text" 
                    value="${customPhrases[i]}" 
                    onchange="updatePhrase(${i}, this.value)"
                />
            `;

            editor.appendChild(item);
        }
    }

    function updatePhrase(number, value) {
        customPhrases[number] = value;
    }

    function speak(text) {
        speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        const selectedVoice = document.getElementById("voiceSelect").value;
        const voice = voices.find(v => v.name === selectedVoice);

        if (voice) {
            utterance.voice = voice;
        }

        utterance.rate = parseFloat(document.getElementById("rate").value);

        speechSynthesis.speak(utterance);
    }

    function repeatLast() {
        if (calledNumbers.length === 0) return;

        const last = calledNumbers[calledNumbers.length - 1];
        speak(customPhrases[last]);
    }

    function resetGame() {
        if (confirm("Reset the game?")) {
            initGame();
        }
    }

    function loadVoices() {
        voices = speechSynthesis.getVoices();

        const select = document.getElementById("voiceSelect");
        select.innerHTML = "";

        const englishVoices = voices.filter(v =>
            v.lang.includes("en")
        );

        englishVoices.forEach(v => {
            const option = document.createElement("option");
            option.value = v.name;
            option.textContent = `${v.name} (${v.lang})`;
            select.appendChild(option);
        });

        // Prefer UK voices if available
        const ukVoice = englishVoices.find(v =>
            v.lang === "en-GB"
        );

        if (ukVoice) {
            select.value = ukVoice.name;
        }
    }

    speechSynthesis.onvoiceschanged = loadVoices;

    initGame();
    loadVoices();
</script>

</body>
</html>
